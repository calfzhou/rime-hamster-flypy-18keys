### 通用样式声明 begin ###

# 字母按键背景样式
alphabeticButtonBackgroundStyle:
  type: original
  insets: {top: 5, left: 3, bottom: 5, right: 3}
  normalColor: BBBBBB66
  highlightColor: BBBBBB66
  cornerRadius: 7
  normalLowerEdgeColor: 00000099
  highlightLowerEdgeColor: 00000099
  borderSize: 0.2
  normalBorderColor: FFFFFF1A
  highlightBorderColor: FFFFFF1A
  animation: alphabeticBackgroundAnimation

# 字母键前景通用属性
alphabeticButtonForegroundStyle: &alphabeticButtonForegroundStyle
  normalColor: ffffff
  highlightColor: ffffff
  fontSize: 1.25em
  #  fontWeight: regular
  center:
    x: 0.5
    y: 0.8

# 自定义功能按键前景通用属性
alphabeticCustomButtonForegroundStyle: &alphabeticCustomButtonForegroundStyle
  normalColor: ffffff
  highlightColor: ffffff
  fontSize: 1.125em
  #  fontWeight: regular
  center:
    x: 0.5
    y: 0.5

# 大写状态下字母键前景通用属性
alphabeticButtonUppercasedStateForegroundStyle: &alphabeticButtonUppercasedStateForegroundStyle
  normalColor: ffffff
  highlightColor: ffffff
  fontSize: 1.25em
  #  fontWeight: regular
  center:
    y: 0.85

# 字母键上划角标前景通用属性
alphabeticSwipeUpBadgeStyle: &alphabeticSwipeUpBadgeStyle
  normalColor: E5E5EA
  highlightColor: E5E5EA
  fontSize: 0.625em
  #  fontWeight: regular
  center:
    x: 0.25
    y: 0.65

# 字母键下划角标前景通用属性
alphabeticSwipeDownBadgeStyle: &alphabeticSwipeDownBadgeStyle
  normalColor: E5E5EA
  highlightColor: E5E5EA
  fontSize: 0.625em
  #  fontWeight: regular
  center:
    x: 0.75
    y: 0.65


# 字母键 hint 气泡前景通用属性
alphabeticHintStyle: &alphabeticHintStyle
  fontSize: 1.875em
  normalColor: E5E5EA
  center:
    y: 0.55

# 字母键下划角标sf symbol前景通用属性
sfsymbolSwipeDownBadgeStyle: &sfsymbolSwipeDownBadgeStyle
  normalColor: E5E5EA
  highlightColor: E5E5EA
  fontSize: 0.625em
  #  fontWeight: regular
  center:
    x: 0.75
    y: 0.25

# sf symbol的 hint 气泡前景通用属性
sfsymbolHintStyle: &sfsymbolHintStyle
  fontSize: 1.875em
  normalColor: E5E5EA
  center:
    y: 0.25

# 字母键长按前景通用属性
alphabeticHoldSymbolStyle: &alphabeticHoldSymbolStyle
  fontSize: 1.125em
  normalColor: E5E5EA
  highlightColor: ffffff
  center:
    y: 0.5

# 字母按键 hint 气泡背景样式
alphabeticHintBackgroundStyle:
  type: original
  normalColor: 707070
  borderColor: 6E6E6E
  borderSize: 1
  topCornerRadius: 10
  bottomCornerRadius: 5
  # shadowColor: 797B7E
  # shadowOffset: { x: 0, y: 5 }

# 字母按键长按背景样式
alphabeticHoldSymbolsBackgroundStyle:
  type: original
  normalColor: 707070
  borderColor: 6E6E6E
  borderSize: 1
  topCornerRadius: 10
  bottomCornerRadius: 5

# 字母按键长按选中状态背景样式
alphabeticHoldSymbolsSelectedStyle:
  type: original
  normalColor: 0279FE
  cornerRadius: 5

# 功能按键背景样式
systemButtonBackgroundStyle: &systemButtonBackgroundStyle
  type: original
  insets: {top: 5, left: 3, bottom: 5, right: 3}
  normalColor: '55555580'
  highlightColor: BBBBBB80
  cornerRadius: 5
  normalLowerEdgeColor: 00000099
  highlightLowerEdgeColor: 00000099
  borderSize: 0.2
  normalBorderColor: FFFFFF14
  highlightBorderColor: FFFFFF14
  animation: alphabeticBackgroundAnimation

# 蓝色功能按键背景样式
blueSystemButtonBackgroundStyle:
  type: original
  insets: {top: 5, left: 3, bottom: 5, right: 3}
  normalColor: 0279FE
  highlightColor: BBBBBB66
  cornerRadius: 5
  normalLowerEdgeColor: 00000099
  highlightLowerEdgeColor: 00000099
  borderSize: 0.2
  normalBorderColor: FFFFFF14
  highlightBorderColor: FFFFFF14
  animation: alphabeticBackgroundAnimation

# 功能键前景通用属性
systemButtonForegroundStyle: &systemButtonForegroundStyle
  normalColor: ffffff
  highlightColor: ffffff
  fontSize: 1em
  #  fontWeight: regular
  center:
    y: 0.8

# 键盘背景通用属性
backgroundOriginalStyle: &backgroundOriginalStyle
  type: original
  normalColor: 2C2C2C03 # 2C2C2C00

# 字母按键背景动画
alphabeticBackgroundAnimation:
  # type: 动画类型
  # - bounds: 尺寸大小变化动画
- type: bounds
  duration: 80   # 动画时长，单位毫秒
  repeatCount: 1
  fromScale: 1
  toScale: 0.8
- type: bounds
  duration: 80
  repeatCount: 1
  fromScale: 0.8
  toScale: 1


### 通用样式声明 end ###

### 键盘定义 ###

preeditHeight: 20 # 25

toolbarHeight: 40 # 35

keyboardHeight: 216  

preedit:
  insets: {left: 4, top: 2}
  backgroundStyle: preeditBackgroundStyle
  foregroundStyle: preeditForegroundStyle

preeditBackgroundStyle:
  <<: *backgroundOriginalStyle

preeditForegroundStyle:
  textColor: ffffff
  fontSize: 0.88em
#  fontWeight: regular

toolbar:
  backgroundStyle: toolbarBackgroundStyle
  primaryButtonStyle: primaryButtonStyle
  secondaryButtonStyle:
  - toolbarButton1Style
  - toolbarButton2Style
  - toolbarButton3Style
  - toolbarButton4Style
  - toolbarButton5Style
  horizontalCandidateStyle: horizontalCandidateStyle
  verticalCandidateStyle: verticalCandidateStyle
  candidateContextMenu: candidateContextMenuStyle


candidateContextMenuStyle: #candidateContextMenu有两个属性：name、action
- name: "左移"
  action: {sendKeys: "Control+j"}
- name: "右移"
  action: {sendKeys: "Control+k"}
- name: "重置"
  action: {sendKeys: "Control+l"}
- name: "置顶"
  action: {sendKeys: "Control+p"}


toolbarBackgroundStyle:
  <<: *backgroundOriginalStyle


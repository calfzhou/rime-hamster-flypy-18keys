name: Hamster 18Key Minimal
author: BlackCat,一土白申
fontFace:
#苹方常规体
#  - name: PingFangSC-Regular
#苹方细体
#  - name: PingFangSC-Light
#苹方中黑体
#  - name: PingFangSC-Medium
#苹方极细体

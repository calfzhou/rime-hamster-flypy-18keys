# Rime schema
# encoding: utf-8

# 雾凇14键 26键转14键 QWERTY 映射
# q,w -> q   e,r -> e   t,y -> t   u,i -> u   o,p -> o
# a,s -> a   d,f -> d   g,h -> g   j,k -> j
# z,x -> z   c,v -> c   b,n -> b
# l, m 单键

algebra_14key:
  __append:
    - derive/[qw]/q/
    - derive/[er]/e/
    - derive/[ty]/t/
    - derive/[ui]/u/
    - derive/[op]/o/
    - derive/[as]/a/
    - derive/[df]/d/
    - derive/[gh]/g/
    - derive/[jk]/j/
    - derive/[zx]/z/
    - derive/[cv]/c/
    - derive/[bn]/b/
    - xlit/qwertyuiopasdfghjklzxcvbnm/qqeettuuooaaddggjjlzzccbbm/

# 雾凇18键 26键转18键 QWERTY 映射
# q -> q     w,e -> w   r,t -> r   y -> y     u -> u     i,o -> i   p -> p
# a -> a     s,d -> s   f,g -> f   h -> h     j,k -> j   l -> l
# z -> z     x,c -> x   v -> v     b,n -> b   m -> m
algebra_18key:
  __append:
    - derive/[we]/w/
    - derive/[rt]/r/
    - derive/[io]/i/
    - derive/[sd]/s/
    - derive/[fg]/f/
    - derive/[jk]/j/
    - derive/[xc]/x/
    - derive/[bn]/b/
    - xlit/qwertyuiopasdfghjklzxcvbnm/qwwrryuiipassffhjjlzxxvbbm/




name: Release on Tag

on:
  push:
    tags:
      - "v*"
      - "*.*.*"
      - "*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build .hskin files
        run: make clean && make hskin

      - name: Build recipe zip packages
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist

          for recipe in recipes/*.recipe.yaml; do
            [ -f "$recipe" ] || continue
            recipe_name="$(basename "$recipe" .recipe.yaml)"

            mapfile -t install_files < <(
              awk '
                /^install_files:/ { in_list=1; next }
                in_list && /^[^[:space:]-]/ { in_list=0 }
                in_list && /^[[:space:]]*-[[:space:]]*/ {
                  sub(/^[[:space:]]*-[[:space:]]*/, "")
                  print
                }
              ' "$recipe"
            )

            if [ "${#install_files[@]}" -eq 0 ]; then
              echo "No install_files found in $recipe, skipping."
              continue
            fi

            zip_path="dist/${recipe_name}.zip"
            zip -q "$zip_path" "$recipe" "${install_files[@]}"
            echo "Built $zip_path"
          done

      - name: Generate release notes
        id: release_notes
        shell: bash
        run: |
          set -euo pipefail
          current_tag="${GITHUB_REF_NAME}"
          tag_notes="$(git tag -l --format='%(contents)' "$current_tag" | sed '/^[[:space:]]*$/d')"

          if [ -n "$tag_notes" ]; then
            body="$tag_notes"
          else
            previous_tag="$(git describe --tags --abbrev=0 "${current_tag}^" 2>/dev/null || true)"
            if [ -n "$previous_tag" ]; then
              range="${previous_tag}..${current_tag}"
              header="## Changes (${previous_tag} -> ${current_tag})"
            else
              range="${current_tag}"
              header="## Changes (${current_tag})"
            fi

            notes="$(git log --no-merges --pretty='- %s (%h)' ${range})"
            if [ -z "$notes" ]; then
              notes="- No commit summary available in this range."
            fi

            body="${header}\n\n${notes}"
          fi

          {
            echo 'body<<EOF'
            echo -e "$body"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.hskin
            dist/*.zip
          body: ${{ steps.release_notes.outputs.body }}
